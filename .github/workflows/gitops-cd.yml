name: GitOps CD Pipeline

on:
  workflow_call:
    inputs:
      ui:
        required: true
        type: string
      catalog:
        required: true
        type: string
      cart:
        required: true
        type: string
      checkout:
        required: true
        type: string
      orders:
        required: true
        type: string
      sha_short:
        required: true
        type: string
      branch:
        required: true
        type: string

jobs:
  update-gitops:
    name: 🔄 Update ArgoCD Helm Values
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✏️ Update Helm Chart values.yaml files
        run: |
          UPDATED=false
          
          # 1. UI Service
          if [ "${{ inputs.ui }}" = "true" ]; then
            echo "Updating UI Helm values..."
            yq -i '.image.repository = "${{ secrets.DOCKERHUB_USERNAME }}/retail-store-ui" | .image.tag = "${{ inputs.sha_short }}"' src/ui/chart/values.yaml
            UPDATED=true
          fi
          
          # 2. Catalog Service
          if [ "${{ inputs.catalog }}" = "true" ]; then
            echo "Updating Catalog Helm values..."
            yq -i '.image.repository = "${{ secrets.DOCKERHUB_USERNAME }}/retail-store-catalog" | .image.tag = "${{ inputs.sha_short }}"' src/catalog/chart/values.yaml
            UPDATED=true
          fi
          
          # 3. Cart Service
          if [ "${{ inputs.cart }}" = "true" ]; then
            echo "Updating Cart Helm values..."
            yq -i '.image.repository = "${{ secrets.DOCKERHUB_USERNAME }}/retail-store-cart" | .image.tag = "${{ inputs.sha_short }}"' src/cart/chart/values.yaml
            UPDATED=true
          fi
          
          # 4. Checkout Service
          if [ "${{ inputs.checkout }}" = "true" ]; then
            echo "Updating Checkout Helm values..."
            yq -i '.image.repository = "${{ secrets.DOCKERHUB_USERNAME }}/retail-store-checkout" | .image.tag = "${{ inputs.sha_short }}"' src/checkout/chart/values.yaml
            UPDATED=true
          fi
          
          # 5. Orders Service
          if [ "${{ inputs.orders }}" = "true" ]; then
            echo "Updating Orders Helm values..."
            yq -i '.image.repository = "${{ secrets.DOCKERHUB_USERNAME }}/retail-store-orders" | .image.tag = "${{ inputs.sha_short }}"' src/orders/chart/values.yaml
            UPDATED=true
          fi
          
          echo "UPDATED=$UPDATED" >> $GITHUB_ENV

      - name: 🚀 Commit and Push GitOps changes
        if: env.UPDATED == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changed Helm values files
          git add src/*/chart/values.yaml
          
          # Commit and push only if there are actual diffs
          git diff --quiet && git diff --staged --quiet || {
            git commit -m "chore(gitops): auto-update service image tags to ${{ inputs.sha_short }} [skip ci]"
            git push origin ${{ inputs.branch }}
          }
